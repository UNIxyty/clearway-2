services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    image: clearway-selfhosted:latest
    command: npm run start
    expose:
      - "3000"
    environment:
      STORAGE_ROOT: /storage
      CACHE_ROOT: /cache
      NODE_ENV: production
      NOTAM_SYNC_URL: http://notam-sync:3001
      WEATHER_SYNC_URL: http://weather-sync:3001
      AIP_SYNC_URL: http://aip-sync:3002
    volumes:
      - /mnt/ssd-cache:/cache
      - /mnt/hdd-storage:/storage

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - portal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped

  notam-sync:
    image: clearway-selfhosted:latest
    command: node scripts/notam-sync-server.mjs
    environment:
      STORAGE_ROOT: /storage
      CACHE_ROOT: /cache
      NODE_ENV: production
    volumes:
      - /mnt/ssd-cache:/cache
      - /mnt/hdd-storage:/storage

  weather-sync:
    image: clearway-selfhosted:latest
    command: sh -c "SYNC_SERVER_MODE=weather node scripts/notam-sync-server.mjs"
    environment:
      STORAGE_ROOT: /storage
      CACHE_ROOT: /cache
      NODE_ENV: production
    volumes:
      - /mnt/ssd-cache:/cache
      - /mnt/hdd-storage:/storage

  aip-sync:
    image: clearway-selfhosted:latest
    command: node scripts/aip-sync-server.mjs
    environment:
      STORAGE_ROOT: /storage
      CACHE_ROOT: /cache
      NODE_ENV: production
    volumes:
      - /mnt/ssd-cache:/cache
      - /mnt/hdd-storage:/storage
