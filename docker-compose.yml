services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    image: clearway-selfhosted:latest
    command: node server.js
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      STORAGE_ROOT: /storage
      CACHE_ROOT: /cache
      NODE_ENV: production
      NOTAM_SYNC_URL: http://notam-sync:3001
      WEATHER_SYNC_URL: http://weather-sync:3001
      AIP_SYNC_URL: http://aip-sync:3002
      LITHUANIA_SELENIUM_URL: http://lithuania-browser:4444/wd/hub
    volumes:
      - /mnt/ssd-cache:/cache
      - /mnt/hdd-storage:/storage
    depends_on:
      - lithuania-browser

  lithuania-browser:
    image: selenium/standalone-chromium:latest
    shm_size: "2gb"
    ports:
      - "6080:7900"
    environment:
      SE_NODE_MAX_SESSIONS: 1
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      SE_NODE_SESSION_TIMEOUT: 900

  notam-sync:
    image: clearway-selfhosted:latest
    command: node scripts/notam-sync-server.mjs
    env_file:
      - .env
    environment:
      STORAGE_ROOT: /storage
      CACHE_ROOT: /cache
      NODE_ENV: production
      NOTAM_SCRAPER: crewbriefing
      SYNC_SECRET: ${NOTAM_SYNC_SECRET}
    volumes:
      - /mnt/ssd-cache:/cache
      - /mnt/hdd-storage:/storage

  weather-sync:
    image: clearway-selfhosted:latest
    command: sh -c "SYNC_SERVER_MODE=weather node scripts/notam-sync-server.mjs"
    env_file:
      - .env
    environment:
      STORAGE_ROOT: /storage
      CACHE_ROOT: /cache
      NODE_ENV: production
      NOTAM_SCRAPER: crewbriefing
      SYNC_SECRET: ${WEATHER_SYNC_SECRET}
    volumes:
      - /mnt/ssd-cache:/cache
      - /mnt/hdd-storage:/storage

  aip-sync:
    image: clearway-selfhosted:latest
    command: node scripts/aip-sync-server.mjs
    env_file:
      - .env
    environment:
      STORAGE_ROOT: /storage
      CACHE_ROOT: /cache
      NODE_ENV: production
      SYNC_SECRET: ${NOTAM_SYNC_SECRET}
    volumes:
      - /mnt/ssd-cache:/cache
      - /mnt/hdd-storage:/storage
