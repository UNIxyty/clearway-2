<!-- Supabase Email OTP template (match portal theme) -->
<!-- Paste into Supabase Dashboard → Authentication → Email Templates → OTP -->
<div style="font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; background:#0b1220; padding:32px;">
  <div style="max-width:560px; margin:0 auto; background:#0f172a; border:1px solid rgba(148,163,184,0.2); border-radius:16px; overflow:hidden;">
    <div style="padding:20px 24px; border-bottom:1px solid rgba(148,163,184,0.18); background:rgba(2,6,23,0.45);">
      <div style="font-weight:700; letter-spacing:-0.02em; color:#e2e8f0; font-size:16px;">Clearway</div>
      <div style="color:#94a3b8; font-size:12px; margin-top:4px;">AIP Data Portal</div>
    </div>
    <div style="padding:24px;">
      <h1 style="margin:0; color:#e2e8f0; font-size:18px; font-weight:700; letter-spacing:-0.02em;">Your confirmation code</h1>
      <p style="margin:10px 0 0; color:#94a3b8; font-size:14px; line-height:1.55;">
        Enter this code in the portal to sign in. If you didn’t request this, you can ignore this email.
      </p>
      <div style="margin:18px 0 8px; background:rgba(148,163,184,0.08); border:1px solid rgba(148,163,184,0.18); border-radius:14px; padding:16px; text-align:center;">
        <div style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:28px; letter-spacing:0.22em; color:#f8fafc; font-weight:800;">
          {{ .Token }}
        </div>
      </div>
      <p style="margin:12px 0 0; color:#94a3b8; font-size:12px; line-height:1.55;">
        This code expires soon. For security, do not forward this message.
      </p>
    </div>
    <div style="padding:16px 24px; border-top:1px solid rgba(148,163,184,0.18); color:#64748b; font-size:12px;">
      © {{ .SiteURL }} • Clearway Portal
    </div>
  </div>
</div>
