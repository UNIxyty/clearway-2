<!-- Supabase Email template (Reset password) -->
<!-- Paste into Supabase Dashboard -> Authentication -> Email Templates -> Reset password -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reset your Clearway password</title>
  </head>
  <body style="margin:0;background:#f6f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#0f172a;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="padding:32px 12px;background:#f6f7fb;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:560px;">
            <tr>
              <td style="padding:0 8px 14px 8px;">
                <img
                  src="https://qdeioktxzarjonlqgznt.supabase.co/storage/v1/object/public/storage/header_logo_white.svg"
                  width="170"
                  alt="Clearway"
                  style="display:block;border:0;outline:none;text-decoration:none;filter:invert(1);-webkit-filter:invert(1);"
                />
              </td>
            </tr>
            <tr>
              <td style="background:#fff;border:1px solid #e6e8ef;border-radius:16px;padding:24px 22px;">
                <h1 style="margin:0 0 8px 0;font-size:18px;line-height:1.3;">Reset password</h1>
                <p style="margin:0 0 16px 0;font-size:14px;line-height:1.55;color:#334155;">
                  Click below to choose a new password for your Clearway account.
                </p>
                <a
                  href="{{ .ConfirmationURL }}"
                  style="display:inline-block;background:#111827;color:#fff;text-decoration:none;font-weight:600;font-size:14px;padding:12px 16px;border-radius:10px;"
                >
                  Reset password
                </a>
                <p style="margin:16px 0 0 0;font-size:12px;line-height:1.55;color:#64748b;">
                  If you did not request a reset, ignore this email and your password will remain unchanged.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:14px 8px 0 8px;">
                <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td style="font-size:11px;line-height:1.6;color:#94a3b8;">Clearway</td>
                    <td align="right">
                      <img
                        src="https://qdeioktxzarjonlqgznt.supabase.co/storage/v1/object/public/storage/logo.png"
                        width="120"
                        alt="Verxyl"
                        style="display:block;border:0;outline:none;text-decoration:none;opacity:0.9;"
                      />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
