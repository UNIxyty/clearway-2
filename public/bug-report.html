<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BUG REPORT — tracker</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      padding: 1.5rem clamp(1rem, 4vw, 2.5rem) 3rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.75rem;
    }
    h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }
    h2:first-of-type { margin-top: 0; }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem 1rem;
      align-items: center;
      padding: 0.65rem 0.85rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }
    @media (max-width: 560px) {
      .row { grid-template-columns: 1fr; }
    }
    .desc { font-size: 0.9rem; }
    select {
      min-width: 9.5rem;
      padding: 0.45rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
    }
    select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .toolbar button {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }
    .toolbar button:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <h1>BUG REPORT</h1>
  <p class="sub">Source: BUG REPORT.docx · Status is saved in this browser (localStorage).</p>
  <div class="toolbar">
    <button type="button" id="btn-export">Export JSON</button>
    <button type="button" id="btn-reset">Reset all to awaiting</button>
  </div>
  <div id="app"></div>

  <script>
    const STORAGE_KEY = "bug-report-status-v1";

    const REPORT = [
      {
        section: "AFRICA",
        items: [
          "Benin - Ok",
          "Burkina Faso - Ok",
          "Cameroun - Ok",
          "Centrafrique - Ok",
          "Comores - Ok",
          "Congo - Ok",
          "Côte d'Ivoire - Ok",
          "Gabon - Ok",
          "Guinée Bissau - Ok",
          "Guinée Equatoriale - Ok",
          "Libya – Not working",
          "Madagascar - Ok",
          "Mali - Ok",
          "Mauritanie - Ok",
          "Niger - Ok",
          "Republic of Cabo Verde - Ok",
          "Rwanda - Ok",
          "Sénégal - Ok",
          "Somalia – Not working",
          "Tchad - Ok",
          "Togo - Ok",
        ],
      },
      {
        section: "ASIA",
        items: [
          "Armenia (UD) - Ok, but missing link to full AIP",
          "Azerbaijan (UB) - Ok, but missing link to full AIP",
          "Bahrain - Ok",
          "Bhutan - Ok",
          "Georgia (UG) - Ok, but missing link to full AIP",
          "Hong Kong – Ok",
          "India - Ok",
          "Iran – Not working",
          "Israel - Ok",
          "Japan - Ok",
          "Kuwait – Not working",
          "Kyrgyzstan (UC) - Ok, but missing link to full AIP",
          "Malaysia – Not working",
          "Maldives – Not working",
          "Mongolia – Not working",
          "Myanmar – Not working",
          "Nepal – Not working",
          "Oman – Not working",
          "Pakistan – Not working",
          "Qatar – Not working",
          "Saudi Arabia – Not working",
          "Singapore – Not working",
          "South Korea – Not working",
          "Sri Lanka – Not working",
          "Taiwan – Not working",
          "Tajikistan – Not working",
          "Thailand – Not working",
          "Turkmenistan – Not working",
          "United Arab Emirates – Not working",
          "Uzbekistan – Not working",
          "Jordan (OJ) - Ok, but missing link to full AIP",
          "Kazakhstan (UA) - Ok, but missing link to full AIP",
          "Philippines (RP) - Ok, but missing link to full AIP",
        ],
      },
      {
        section: "EUROPE",
        items: [
          "Austria (LO) - Ok, but missing link to full AIP",
          "Belarus - Ok",
          "Bulgaria (LB) - Ok, but missing link to full AIP",
          "Czech Republic (LK) - Ok, but missing link to full AIP",
          "Denmark (EK) - Ok, but missing link to full AIP",
          "Ireland (EI) - Ok, but missing link to full AIP",
          "Italy (LI) - Ok, but missing link to full AIP",
          "Kosovo – Not loading.",
          "Russia - Ok, but missing link to full AIP",
          "Albania (LA) - Ok, but missing link to full AIP",
          "Belgium (EB)  - Ok, but missing link to full AIP",
          "Bosnia/Herzeg. (LQ) - Ok",
          "Croatia (LD) - Ok, but missing link to full AIP",
          "Cyprus (LC) - Ok, but missing link to full AIP",
          "Estonia (EE) - Ok, but missing link to full AIP",
          "Faroe Islands (XX) – Not loading.",
          "Finland (EF) - Ok, but missing link to full AIP",
          "France (LF) - Ok, but missing link to full AIP",
          "Germany (ED) - Ok, but missing link to full AIP",
          "Greece (LG) - Ok, but missing link to full AIP",
          "Hungary (LH) - Ok, but missing link to full AIP",
          "Iceland (BI) - Ok, but missing link to full AIP",
          "Latvia (EV) - Ok, but missing link to full AIP",
          "Lithuania (EY) - Ok, but missing link to full AIP",
          "Malta (LM) - Ok, but missing link to full AIP",
          "Moldova (LU) - Ok, but missing link to full AIP",
          "Netherlands (EH) - Ok, but missing link to full AIP",
          "Norway (EN) - Ok, but missing link to full AIP",
          "Poland (EP) - Ok, but missing link to full AIP",
          "Portugal (LP) - Ok, but missing link to full AIP",
          "Republic of North Macedonia (LW) - Ok, but missing link to full AIP",
          "Romania (LR) - Ok, but missing link to full AIP",
          "Serbia and Montenegro (LY) - Ok, but missing link to full AIP",
          "Slovakia (LZ) - Ok, but missing link to full AIP",
          "Slovenia (LJ) - Ok, but missing link to full AIP",
          "Spain (LE) – Not working airports with ICAO: GC.. , ICAO: LE.. working.",
          "Sweden (ES) - Ok, but missing link to full AIP",
          "Switzerland (LS) - Ok, but missing link to full AIP",
          "Turkey (LT) - Ok, but missing link to full AIP",
          "Ukraine (UK) - Ok, but missing link to full AIP",
          "United Kingdom (EG) - Ok, but missing link to full AIP",
        ],
      },
      {
        section: "NORTH AMERICA & CARIBBEAN",
        items: [
          "Costa Rica- Ok",
          "Cuba- Ok",
          "El Salvador- Ok",
          "Guatemala- Ok",
          "Honduras - Ok, but GEN 1.2 in Spanish",
          "Panama – Not working",
          "United States of America – Not working",
          "Greenland (BG) - Ok, but missing link to full AIP",
        ],
      },
      {
        section: "SOUTH AMERICA",
        items: [
          "Chile- Ok",
          "Ecuador Ok, but GEN 1.2 in Spanish",
          "Venezuela – Not working",
        ],
      },
    ];

    function rowId(sectionIndex, itemIndex) {
      return `s${sectionIndex}-i${itemIndex}`;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function render() {
      const state = loadState();
      const app = document.getElementById("app");
      app.innerHTML = "";

      REPORT.forEach((sec, si) => {
        const h2 = document.createElement("h2");
        h2.textContent = sec.section;
        app.appendChild(h2);

        sec.items.forEach((text, ii) => {
          const id = rowId(si, ii);
          const row = document.createElement("div");
          row.className = "row";

          const desc = document.createElement("div");
          desc.className = "desc";
          desc.textContent = text;

          const sel = document.createElement("select");
          sel.setAttribute("aria-label", "Status for: " + text);
          ["awaiting", "solved", "failed"].forEach((val) => {
            const opt = document.createElement("option");
            opt.value = val;
            opt.textContent = val.charAt(0).toUpperCase() + val.slice(1);
            sel.appendChild(opt);
          });
          sel.value = state[id] || "awaiting";

          sel.addEventListener("change", () => {
            const next = loadState();
            next[id] = sel.value;
            saveState(next);
          });

          row.appendChild(desc);
          row.appendChild(sel);
          app.appendChild(row);
        });
      });
    }

    document.getElementById("btn-reset").addEventListener("click", () => {
      if (!confirm("Reset all rows to “awaiting”?")) return;
      localStorage.removeItem(STORAGE_KEY);
      render();
    });

    document.getElementById("btn-export").addEventListener("click", () => {
      const state = loadState();
      const out = REPORT.map((sec, si) => ({
        section: sec.section,
        items: sec.items.map((text, ii) => ({
          text,
          status: state[rowId(si, ii)] || "awaiting",
        })),
      }));
      const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "bug-report-status.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    render();
  </script>
</body>
</html>
