<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BUG REPORT — tracker</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      padding: 1.5rem clamp(1rem, 4vw, 2.5rem) 3rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.75rem;
    }
    h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }
    h2:first-of-type { margin-top: 0; }
    .row {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      padding: 0.65rem 0.85rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }
    .row-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem 1rem;
      align-items: center;
    }
    @media (max-width: 560px) {
      .row-top { grid-template-columns: 1fr; }
    }
    .desc { font-size: 0.9rem; }
    .remarks-block {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .remarks-block label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .remarks-block textarea {
      width: 100%;
      min-height: 2.75rem;
      resize: vertical;
      padding: 0.45rem 0.55rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      line-height: 1.35;
    }
    .remarks-block textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: transparent;
    }
    .remarks-block textarea::placeholder {
      color: var(--muted);
      opacity: 0.7;
    }
    select {
      min-width: 9.5rem;
      padding: 0.45rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
    }
    select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .toolbar button {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }
    .toolbar button:hover { border-color: var(--accent); }
    .filter-switch {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
    }
    .filter-switch span {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0 0.35rem;
    }
    .filter-switch button {
      padding: 0.35rem 0.65rem;
      font-size: 0.8rem;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .filter-switch button[aria-pressed="true"] {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
    }
    .row.row--ok {
      opacity: 0.72;
      border-color: #2a4a3a;
      background: #15221c;
    }
    .row-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }
    .badge-ok {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: #1e3d2f;
      color: #8fd4a8;
      white-space: nowrap;
    }
    .row.row--ok select {
      opacity: 0.85;
    }
    .row--st-awaiting {
      border-left: 4px solid #c9a227;
      background: linear-gradient(90deg, rgba(201, 162, 39, 0.14) 0%, var(--card) 55%);
    }
    .row--st-solved {
      border-left: 4px solid #3d9e5c;
      background: linear-gradient(90deg, rgba(61, 158, 92, 0.14) 0%, var(--card) 55%);
    }
    .row--st-failed {
      border-left: 4px solid #c94a4a;
      background: linear-gradient(90deg, rgba(201, 74, 74, 0.14) 0%, var(--card) 55%);
    }
    .row.row--ok.row--st-solved {
      background: #15221c;
      border-left-color: #4caf50;
    }
    .row--st-awaiting select {
      background: #241e12;
      border-color: #7a6220;
      color: #f2e6bc;
    }
    .row--st-solved select {
      background: #122018;
      border-color: #2d6a45;
      color: #c8f0d8;
    }
    .row--st-failed select {
      background: #241212;
      border-color: #7a3030;
      color: #f0c8c8;
    }
  </style>
</head>
<body>
  <h1>BUG REPORT</h1>
  <p class="sub">Source: BUG REPORT.docx · Plain “- Ok” = working. <strong>False</strong> hides plain Ok and anything marked <strong>Solved</strong>. Status and remarks are saved in this browser.</p>
  <div class="toolbar">
    <div class="filter-switch" role="group" aria-label="List filter">
      <span>Show</span>
      <button type="button" id="filter-all" aria-pressed="true">All</button>
      <button type="button" id="filter-false" aria-pressed="false" title="Hide plain Ok and all Solved rows">False</button>
    </div>
    <button type="button" id="btn-export">Export JSON</button>
    <button type="button" id="btn-reset">Reset statuses</button>
  </div>
  <div id="app"></div>

  <script>
    const STORAGE_KEY = "bug-report-status-v1";
    const REMARKS_KEY = "bug-report-remarks-v1";
    const FILTER_KEY = "bug-report-filter-v1";

    /** Plain “- Ok” / “– Ok” only: working, no bug fix. Not “Ok, but …”. */
    function isPlainOk(text) {
      const t = text.trim();
      if (/\bbut\b/i.test(t)) return false;
      if (/not\s+working|not\s+loading|missing\s+link|\bspanish\b/i.test(t)) return false;
      return /\s*[-\u2013]\s*Ok\.?\s*$/i.test(t);
    }

    function loadFilter() {
      try {
        const v = localStorage.getItem(FILTER_KEY);
        return v === "false" ? "false" : "all";
      } catch {
        return "all";
      }
    }

    function saveFilter(mode) {
      localStorage.setItem(FILTER_KEY, mode);
    }

    let filterMode = loadFilter();

    const REPORT = [
      {
        section: "AFRICA",
        items: [
          "Benin - Ok",
          "Burkina Faso - Ok",
          "Cameroun - Ok",
          "Centrafrique - Ok",
          "Comores - Ok",
          "Congo - Ok",
          "Côte d'Ivoire - Ok",
          "Gabon - Ok",
          "Guinée Bissau - Ok",
          "Guinée Equatoriale - Ok",
          "Libya – Not working",
          "Madagascar - Ok",
          "Mali - Ok",
          "Mauritanie - Ok",
          "Niger - Ok",
          "Republic of Cabo Verde - Ok",
          "Rwanda - Ok",
          "Sénégal - Ok",
          "Somalia – Not working",
          "Tchad - Ok",
          "Togo - Ok",
        ],
      },
      {
        section: "ASIA",
        items: [
          "Armenia (UD) - Ok, but missing link to full AIP",
          "Azerbaijan (UB) - Ok, but missing link to full AIP",
          "Bahrain - Ok",
          "Bhutan - Ok",
          "Georgia (UG) - Ok, but missing link to full AIP",
          "Hong Kong – Ok",
          "India - Ok",
          "Iran – Not working",
          "Israel - Ok",
          "Japan - Ok",
          "Kuwait – Not working",
          "Kyrgyzstan (UC) - Ok, but missing link to full AIP",
          "Malaysia – Not working",
          "Maldives – Not working",
          "Mongolia – Not working",
          "Myanmar – Not working",
          "Nepal – Not working",
          "Oman – Not working",
          "Pakistan – Not working",
          "Qatar – Not working",
          "Saudi Arabia – Not working",
          "Singapore – Not working",
          "South Korea – Not working",
          "Sri Lanka – Not working",
          "Taiwan – Not working",
          "Tajikistan – Not working",
          "Thailand – Not working",
          "Turkmenistan – Not working",
          "United Arab Emirates – Not working",
          "Uzbekistan – Not working",
          "Jordan (OJ) - Ok, but missing link to full AIP",
          "Kazakhstan (UA) - Ok, but missing link to full AIP",
          "Philippines (RP) - Ok, but missing link to full AIP",
        ],
      },
      {
        section: "EUROPE",
        items: [
          "Austria (LO) - Ok, but missing link to full AIP",
          "Belarus - Ok",
          "Bulgaria (LB) - Ok, but missing link to full AIP",
          "Czech Republic (LK) - Ok, but missing link to full AIP",
          "Denmark (EK) - Ok, but missing link to full AIP",
          "Ireland (EI) - Ok, but missing link to full AIP",
          "Italy (LI) - Ok, but missing link to full AIP",
          "Kosovo – Not loading.",
          "Russia - Ok, but missing link to full AIP",
          "Albania (LA) - Ok, but missing link to full AIP",
          "Belgium (EB)  - Ok, but missing link to full AIP",
          "Bosnia/Herzeg. (LQ) - Ok",
          "Croatia (LD) - Ok, but missing link to full AIP",
          "Cyprus (LC) - Ok, but missing link to full AIP",
          "Estonia (EE) - Ok, but missing link to full AIP",
          "Faroe Islands (XX) – Not loading.",
          "Finland (EF) - Ok, but missing link to full AIP",
          "France (LF) - Ok, but missing link to full AIP",
          "Germany (ED) - Ok, but missing link to full AIP",
          "Greece (LG) - Ok, but missing link to full AIP",
          "Hungary (LH) - Ok, but missing link to full AIP",
          "Iceland (BI) - Ok, but missing link to full AIP",
          "Latvia (EV) - Ok, but missing link to full AIP",
          "Lithuania (EY) - Ok, but missing link to full AIP",
          "Malta (LM) - Ok, but missing link to full AIP",
          "Moldova (LU) - Ok, but missing link to full AIP",
          "Netherlands (EH) - Ok, but missing link to full AIP",
          "Norway (EN) - Ok, but missing link to full AIP",
          "Poland (EP) - Ok, but missing link to full AIP",
          "Portugal (LP) - Ok, but missing link to full AIP",
          "Republic of North Macedonia (LW) - Ok, but missing link to full AIP",
          "Romania (LR) - Ok, but missing link to full AIP",
          "Serbia and Montenegro (LY) - Ok, but missing link to full AIP",
          "Slovakia (LZ) - Ok, but missing link to full AIP",
          "Slovenia (LJ) - Ok, but missing link to full AIP",
          "Spain (LE) – Not working airports with ICAO: GC.. , ICAO: LE.. working.",
          "Sweden (ES) - Ok, but missing link to full AIP",
          "Switzerland (LS) - Ok, but missing link to full AIP",
          "Turkey (LT) - Ok, but missing link to full AIP",
          "Ukraine (UK) - Ok, but missing link to full AIP",
          "United Kingdom (EG) - Ok, but missing link to full AIP",
        ],
      },
      {
        section: "NORTH AMERICA & CARIBBEAN",
        items: [
          "Costa Rica- Ok",
          "Cuba- Ok",
          "El Salvador- Ok",
          "Guatemala- Ok",
          "Honduras - Ok, but GEN 1.2 in Spanish",
          "Panama – Not working",
          "United States of America – Not working",
          "Greenland (BG) - Ok, but missing link to full AIP",
        ],
      },
      {
        section: "SOUTH AMERICA",
        items: [
          "Chile- Ok",
          "Ecuador Ok, but GEN 1.2 in Spanish",
          "Venezuela – Not working",
        ],
      },
    ];

    function rowId(sectionIndex, itemIndex) {
      return `s${sectionIndex}-i${itemIndex}`;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadRemarks() {
      try {
        const raw = localStorage.getItem(REMARKS_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function saveRemarks(remarks) {
      localStorage.setItem(REMARKS_KEY, JSON.stringify(remarks));
    }

    const remarkTimers = new Map();
    function persistRemarksForRow(id, value) {
      const all = loadRemarks();
      const v = value.trim();
      if (v) all[id] = v;
      else delete all[id];
      saveRemarks(all);
    }
    function scheduleRemarksSave(id, value) {
      const prev = remarkTimers.get(id);
      if (prev) clearTimeout(prev);
      remarkTimers.set(
        id,
        setTimeout(() => {
          remarkTimers.delete(id);
          persistRemarksForRow(id, value);
        }, 350),
      );
    }

    function syncFilterButtons() {
      const allBtn = document.getElementById("filter-all");
      const falseBtn = document.getElementById("filter-false");
      allBtn.setAttribute("aria-pressed", filterMode === "all" ? "true" : "false");
      falseBtn.setAttribute("aria-pressed", filterMode === "false" ? "true" : "false");
    }

    function defaultStatusForRow(text) {
      return isPlainOk(text) ? "solved" : "awaiting";
    }

    function statusClass(status) {
      if (status === "solved") return "row--st-solved";
      if (status === "failed") return "row--st-failed";
      return "row--st-awaiting";
    }

    function render() {
      const state = loadState();
      const remarksState = loadRemarks();
      const app = document.getElementById("app");
      app.innerHTML = "";
      syncFilterButtons();

      REPORT.forEach((sec, si) => {
        const fragment = document.createDocumentFragment();
        let anyShown = false;

        sec.items.forEach((text, ii) => {
          const plain = isPlainOk(text);
          const id = rowId(si, ii);
          const def = defaultStatusForRow(text);
          const status = state[id] || def;
          if (filterMode === "false" && plain) return;
          if (filterMode === "false" && status === "solved") return;

          const row = document.createElement("div");
          row.className = ["row", plain ? "row--ok" : "", statusClass(status)].filter(Boolean).join(" ");

          const top = document.createElement("div");
          top.className = "row-top";

          const left = document.createElement("div");
          left.className = "desc";

          const head = document.createElement("div");
          head.className = "row-head";
          const textEl = document.createElement("span");
          textEl.textContent = text;
          head.appendChild(textEl);
          if (plain) {
            const badge = document.createElement("span");
            badge.className = "badge-ok";
            badge.textContent = "Working · no fix";
            head.appendChild(badge);
          }
          left.appendChild(head);

          const sel = document.createElement("select");
          sel.setAttribute("aria-label", "Status for: " + text);
          ["awaiting", "solved", "failed"].forEach((val) => {
            const opt = document.createElement("option");
            opt.value = val;
            opt.textContent = val.charAt(0).toUpperCase() + val.slice(1);
            sel.appendChild(opt);
          });
          sel.value = status;
          if (plain) {
            sel.title = "Marked working (plain Ok); change if you still want to track it.";
          }

          sel.addEventListener("change", () => {
            const next = loadState();
            next[id] = sel.value;
            saveState(next);
            render();
          });

          top.appendChild(left);
          top.appendChild(sel);
          row.appendChild(top);

          const remarksWrap = document.createElement("div");
          remarksWrap.className = "remarks-block";
          const remarksLabel = document.createElement("label");
          remarksLabel.setAttribute("for", `remarks-${id}`);
          remarksLabel.textContent = "Remarks";
          const ta = document.createElement("textarea");
          ta.id = `remarks-${id}`;
          ta.rows = 2;
          ta.placeholder = "Notes, owner, links…";
          ta.value = remarksState[id] || "";
          ta.addEventListener("input", () => scheduleRemarksSave(id, ta.value));
          ta.addEventListener("blur", () => {
            const t = remarkTimers.get(id);
            if (t) {
              clearTimeout(t);
              remarkTimers.delete(id);
            }
            persistRemarksForRow(id, ta.value);
          });
          remarksWrap.appendChild(remarksLabel);
          remarksWrap.appendChild(ta);
          row.appendChild(remarksWrap);

          fragment.appendChild(row);
          anyShown = true;
        });

        if (!anyShown) return;

        const h2 = document.createElement("h2");
        h2.textContent = sec.section;
        app.appendChild(h2);
        app.appendChild(fragment);
      });
    }

    document.getElementById("filter-all").addEventListener("click", () => {
      filterMode = "all";
      saveFilter("all");
      render();
    });
    document.getElementById("filter-false").addEventListener("click", () => {
      filterMode = "false";
      saveFilter("false");
      render();
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
      if (!confirm("Reset statuses and clear all remarks? Plain Ok → solved; others → awaiting.")) return;
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(REMARKS_KEY);
      render();
    });

    document.getElementById("btn-export").addEventListener("click", () => {
      const state = loadState();
      const remarks = loadRemarks();
      const out = REPORT.map((sec, si) => ({
        section: sec.section,
        items: sec.items.map((text, ii) => {
          const id = rowId(si, ii);
          return {
            text,
            plainOk: isPlainOk(text),
            status: state[id] || defaultStatusForRow(text),
            remarks: remarks[id] || "",
          };
        }),
      }));
      const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "bug-report-status.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    render();
  </script>
</body>
</html>
